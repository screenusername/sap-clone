<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SAP Clone</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        min-height: 100%;
        min-height: -webkit-fill-available;
        overflow: hidden;
        background: #1a1a2e;
        touch-action: none;
      }

      #game-container {
        width: 100%;
        height: 100%;
        min-height: -webkit-fill-available;
      }

      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        min-height: -webkit-fill-available;
        color: #ced4da;
        font-family: system-ui, sans-serif;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="loading">Loading game…</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
